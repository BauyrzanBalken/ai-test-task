<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CRM Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid var(--primary); }
        .kpi-card h3 { margin: 0; font-size: 14px; color: #64748b; text-transform: uppercase; }
        .kpi-card .value { font-size: 28px; font-weight: bold; margin-top: 10px; }
        .chart-container { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #status { text-align: center; color: #64748b; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Система аналитики заказов</h1>
            <p>RetailCRM + Supabase Real-time Dashboard</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <h3>Выручка</h3>
                <div class="value" id="kpi-revenue">0 ₸</div>
            </div>
            <div class="kpi-card" style="border-top-color: #10b981;">
                <h3>Средний чек</h3>
                <div class="value" id="kpi-avg">0 ₸</div>
            </div>
            <div class="kpi-card" style="border-top-color: #f59e0b;">
                <h3>VIP Клиенты</h3>
                <div class="value" id="kpi-vip">0</div>
            </div>
        </div>

        <div id="status">Подключение к базе...</div>
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        // ТВОИ КЛЮЧИ
        const SUPABASE_URL = 'https://sidmyoefdtbkdyvptzrs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1zG_xgcdFaDc8DDXtL2eoA_u7PB0Z21'; // Взял из твоего скриншота

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        let myChart = null;

        const formatMoney = (num) => new Intl.NumberFormat('ru-RU').format(Math.round(num)) + ' ₸';

        async function loadData() {
            try {
                const { data, error } = await supabaseClient
                    .from('orders')
                    .select('first_name, total_sum')
                    .order('total_sum', { ascending: false });

                if (error) throw error;

                // Считаем метрики
                const totalRevenue = data.reduce((sum, o) => sum + o.total_sum, 0);
                const avgCheck = totalRevenue / data.length;
                const vipCount = data.filter(o => o.total_sum > 50000).length;

                // Обновляем текст
                document.getElementById('kpi-revenue').innerText = formatMoney(totalRevenue);
                document.getElementById('kpi-avg').innerText = formatMoney(avgCheck);
                document.getElementById('kpi-vip').innerText = vipCount;
                document.getElementById('status').innerText = `Обновлено: ${new Date().toLocaleTimeString()} (Заказов: ${data.length})`;

                // Рисуем/Обновляем график
                const ctx = document.getElementById('myChart').getContext('2d');
                if (myChart) myChart.destroy();
                
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(o => o.first_name),
                        datasets: [{
                            label: 'Сумма заказа',
                            data: data.map(o => o.total_sum),
                            backgroundColor: '#3b82f6',
                            borderRadius: 5
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
            } catch (err) {
                document.getElementById('status').innerText = "Ошибка: " + err.message;
            }
        }

        // Запуск и авто-обновление каждые 30 сек
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
